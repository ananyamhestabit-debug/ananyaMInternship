events {}

http {

    server {
        listen 80;
        server_name app.local;

        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name app.local;

        ssl_certificate /etc/nginx/certs/app.local.pem;
        ssl_certificate_key /etc/nginx/certs/app.local-key.pem;

        location / {
            proxy_pass http://backend:3000;
        }
    }

}
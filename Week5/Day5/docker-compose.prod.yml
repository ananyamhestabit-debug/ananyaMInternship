services:

  backend:
    image: node:18
    working_dir: /app
    volumes:
      - ./backend:/app
    command: node index.js
    restart: always

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      retries: 3

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx
    restart: always 
    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ../Day4/certs:/etc/nginx/certs
      - ./frontend:/usr/share/nginx/html 